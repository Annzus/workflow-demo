spring:
  application:
    name: workflow-demo-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workflow_demo}
    username: ${SPRING_DATASOURCE_USERNAME:workflow}
    password: ${SPRING_DATASOURCE_PASSWORD:workflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
