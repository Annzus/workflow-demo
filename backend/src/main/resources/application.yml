spring:
  application:
    name: workflow-demo-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workflow_demo}
    username: ${SPRING_DATASOURCE_USERNAME:workflow}
    password: ${SPRING_DATASOURCE_PASSWORD:workflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

workflow:
  storage:
    minio:
      endpoint: ${WORKFLOW_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${WORKFLOW_MINIO_ACCESS_KEY:workflow}
      secret-key: ${WORKFLOW_MINIO_SECRET_KEY:workflow-secret}
      bucket: ${WORKFLOW_MINIO_BUCKET:workflow-attachments}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
